name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Validate tag version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["TAG_NAME"]
          if not tag.startswith("v"):
              raise SystemExit("release tags must start with 'v'")

          tag_version = tag[1:]
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = data["project"]["version"]

          if project_version != tag_version:
              raise SystemExit(
                  f"tag version ({tag_version}) does not match pyproject version ({project_version})"
              )

          print(f"release version: {tag_version}")
          PY

  build-binaries:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
            asset_name: tubesift-linux-x86_64.tar.gz
          - os: macos-13
            target: darwin-x86_64
            asset_name: tubesift-darwin-x86_64.tar.gz
          - os: macos-14
            target: darwin-arm64
            asset_name: tubesift-darwin-arm64.tar.gz
          - os: windows-latest
            target: windows-x86_64
            asset_name: tubesift-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build single binary with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --name tubesift src/tubesift/__main__.py --collect-all textual --collect-all rich --collect-all yt_dlp

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.asset_name }}" -C dist tubesift

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/tubesift.exe" -DestinationPath "${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      darwin_arm_sha: ${{ steps.shas.outputs.darwin_arm_sha }}
      darwin_amd_sha: ${{ steps.shas.outputs.darwin_amd_sha }}
      linux_amd_sha: ${{ steps.shas.outputs.linux_amd_sha }}

    steps:
      - name: Release metadata
        id: meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release-assets
          merge-multiple: true

      - name: Build checksum file
        id: shas
        run: |
          cd release-assets
          sha256sum tubesift-darwin-arm64.tar.gz | awk '{print $1}' > .sha_darwin_arm
          sha256sum tubesift-darwin-x86_64.tar.gz | awk '{print $1}' > .sha_darwin_amd
          sha256sum tubesift-linux-x86_64.tar.gz | awk '{print $1}' > .sha_linux_amd

          {
            echo "darwin_arm_sha=$(cat .sha_darwin_arm)"
            echo "darwin_amd_sha=$(cat .sha_darwin_amd)"
            echo "linux_amd_sha=$(cat .sha_linux_amd)"
          } >> "$GITHUB_OUTPUT"

          rm -f .sha_darwin_arm .sha_darwin_amd .sha_linux_amd
          sha256sum tubesift-* > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    needs: release
    if: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: balyakin/homebrew-tubesift
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Generate formula
        env:
          SOURCE_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
          DARWIN_ARM_SHA: ${{ needs.release.outputs.darwin_arm_sha }}
          DARWIN_AMD_SHA: ${{ needs.release.outputs.darwin_amd_sha }}
          LINUX_AMD_SHA: ${{ needs.release.outputs.linux_amd_sha }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/tubesift.rb <<EOF
          class Tubesift < Formula
            desc "The fastest zero-config way to search inside YouTube channels from your terminal"
            homepage "https://github.com/${SOURCE_REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG_NAME}/tubesift-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"
              else
                url "https://github.com/${SOURCE_REPO}/releases/download/${TAG_NAME}/tubesift-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_AMD_SHA}"
              end
            end

            on_linux do
              url "https://github.com/${SOURCE_REPO}/releases/download/${TAG_NAME}/tubesift-linux-x86_64.tar.gz"
              sha256 "${LINUX_AMD_SHA}"
            end

            def install
              bin.install "tubesift"
            end

            test do
              assert_match "Usage:", shell_output("#{bin}/tubesift --help")
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd tap
          if git diff --quiet -- Formula/tubesift.rb; then
            echo "Formula is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tubesift.rb
          git commit -m "tubesift ${GITHUB_REF_NAME}"
          git push
